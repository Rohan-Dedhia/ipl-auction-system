<!DOCTYPE html>
<html>

<head>

<title>{{player.name}}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="player-page">

<div class="player-card">

<h1>{{player.name}}</h1>

<p><strong>Role:</strong> {{player.role}}</p>

<p><strong>Nationality:</strong> {{player.nationality}}</p>

<p><strong>Batting Style:</strong> {{player.batting_style}}</p>

<p><strong>Bowling Style:</strong> {{player.bowling_style}}</p>

<p><strong>Runs:</strong> {{player.runs}}</p>

<p><strong>Strike Rate:</strong> {{player.strike_rate}}</p>

<p><strong>Current Bid:</strong> ₹{{player.current_bid}}</p>

<p><strong>Team:</strong> {{player.team}}</p>

<a href="/" class="back-btn">⬅ Back to Auction</a>

</div>

</div>

</body>
</html>
