<!DOCTYPE html>
<html>

<head>
<title>IPL Auction Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1 class="title">🏏 IPL Auction Dashboard</h1>

<table class="auction-table">

<tr>
<th>Player</th>
<th>Base Price</th>
<th>Current Bid</th>
<th>Team</th>
<th>Place Bid</th>
</tr>

{% for player in players %}

<tr>

<td class="player">{{player.name}}</td>
<td>₹ {{player.base_price}}</td>
<td class="bid">₹ {{player.current_bid}}</td>
<td class="team">{{player.team}}</td>

<td>

<form method="POST" class="bid-form">

<input type="hidden" name="player_id" value="{{player.id}}">

<input type="text" name="team" placeholder="Team Name" required>

<input type="number" name="bid" placeholder="Bid Amount" required>

<button type="submit">Bid</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
